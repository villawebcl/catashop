name: E2E Staging

on:
  workflow_dispatch:
    inputs:
      expect_nonce_csp:
        description: "Validar rollout nonce CSP (enforce o report-only) en staging"
        type: boolean
        required: true
        default: false

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Staging smoke
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_EXPECT_NONCE_CSP: ${{ github.event.inputs.expect_nonce_csp == 'true' && 'true' || 'false' }}
          REQUIRE_CSP_HEADER: "true"
        run: npm run e2e:staging

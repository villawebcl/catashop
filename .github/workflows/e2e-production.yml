name: E2E Production

on:
  workflow_dispatch:
    inputs:
      expect_nonce_csp:
        description: "Validar CSP strict nonce en produccion"
        type: boolean
        required: true
        default: true

jobs:
  e2e-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Production smoke
        env:
          STAGING_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          STAGING_EXPECT_NONCE_CSP: ${{ github.event.inputs.expect_nonce_csp == 'true' && 'true' || 'false' }}
        run: npm run e2e:production
